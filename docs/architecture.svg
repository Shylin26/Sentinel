<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SENTINEL architecture</title>
<desc>Seven-service distributed pipeline: GitHub webhook to ML inference to GitHub comment</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #333; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #555; }
    .c-gray rect   { fill: #f1efe8; stroke: #888780; }
    .c-purple rect { fill: #eeedfe; stroke: #534ab7; }
    .c-teal rect   { fill: #e1f5ee; stroke: #0f6e56; }
    .c-coral rect  { fill: #faece7; stroke: #993c1d; }
    .c-amber rect  { fill: #faeeda; stroke: #854f0b; }
    .c-green rect  { fill: #eaf3de; stroke: #3b6d11; }
    .c-gray .th    { fill: #444441; }
    .c-gray .ts    { fill: #5f5e5a; }
    .c-purple .th  { fill: #3c3489; }
    .c-purple .ts  { fill: #534ab7; }
    .c-teal .th    { fill: #085041; }
    .c-teal .ts    { fill: #0f6e56; }
    .c-coral .th   { fill: #712b13; }
    .c-coral .ts   { fill: #993c1d; }
    .c-amber .th   { fill: #633806; }
    .c-amber .ts   { fill: #854f0b; }
    .c-green .th   { fill: #27500a; }
    .c-green .ts   { fill: #3b6d11; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- GitHub -->
<g class="c-gray">
  <rect x="20" y="240" width="110" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="75" y="261" text-anchor="middle" dominant-baseline="central">GitHub</text>
  <text class="ts" x="75" y="279" text-anchor="middle" dominant-baseline="central">git push</text>
</g>
<line x1="130" y1="266" x2="158" y2="266" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Webhook -->
<g class="c-purple">
  <rect x="160" y="230" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="225" y="255" text-anchor="middle" dominant-baseline="central">Webhook</text>
  <text class="ts" x="225" y="273" text-anchor="middle" dominant-baseline="central">FastAPI + HMAC</text>
  <text class="ts" x="225" y="290" text-anchor="middle" dominant-baseline="central">:8000</text>
</g>
<line x1="290" y1="266" x2="318" y2="266" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Kafka -->
<g class="c-teal">
  <rect x="320" y="220" width="130" height="92" rx="8" stroke-width="0.5"/>
  <text class="th" x="385" y="248" text-anchor="middle" dominant-baseline="central">Kafka</text>
  <text class="ts" x="385" y="266" text-anchor="middle" dominant-baseline="central">push-events</text>
  <text class="ts" x="385" y="282" text-anchor="middle" dominant-baseline="central">reviews</text>
  <text class="ts" x="385" y="298" text-anchor="middle" dominant-baseline="central">reviews-dlq</text>
</g>
<line x1="450" y1="266" x2="478" y2="266" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Diff Extractor -->
<g class="c-purple">
  <rect x="480" y="230" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="545" y="255" text-anchor="middle" dominant-baseline="central">Diff extractor</text>
  <text class="ts" x="545" y="273" text-anchor="middle" dominant-baseline="central">GitHub API</text>
  <text class="ts" x="545" y="290" text-anchor="middle" dominant-baseline="central">512-token chunks</text>
</g>
<path d="M545 302 L545 380 L430 380" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="490" y="372" text-anchor="middle" fill="#555">gRPC</text>

<!-- Inference Server -->
<g class="c-coral">
  <rect x="300" y="360" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="365" y="385" text-anchor="middle" dominant-baseline="central">Inference server</text>
  <text class="ts" x="365" y="403" text-anchor="middle" dominant-baseline="central">TorchScript :50051</text>
  <text class="ts" x="365" y="420" text-anchor="middle" dominant-baseline="central">dynamic batching</text>
</g>
<path d="M365 360 L365 310 L390 310" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M385 312 L260 312 L260 360" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Publisher -->
<g class="c-purple">
  <rect x="190" y="360" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="255" y="385" text-anchor="middle" dominant-baseline="central">Publisher</text>
  <text class="ts" x="255" y="403" text-anchor="middle" dominant-baseline="central">Redis dedupe</text>
  <text class="ts" x="255" y="420" text-anchor="middle" dominant-baseline="central">GitHub API</text>
</g>
<path d="M190 396 L75 396 L75 292" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="48" y="370" text-anchor="middle" fill="#555">PR comment</text>

<!-- Autoscaler -->
<g class="c-amber">
  <rect x="300" y="490" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="365" y="515" text-anchor="middle" dominant-baseline="central">Autoscaler</text>
  <text class="ts" x="365" y="533" text-anchor="middle" dominant-baseline="central">Docker SDK</text>
  <text class="ts" x="365" y="550" text-anchor="middle" dominant-baseline="central">Kafka lag watch</text>
</g>
<path d="M365 490 L365 432" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Observability -->
<g class="c-teal">
  <rect x="480" y="490" width="130" height="72" rx="8" stroke-width="0.5"/>
  <text class="th" x="545" y="515" text-anchor="middle" dominant-baseline="central">Observability</text>
  <text class="ts" x="545" y="533" text-anchor="middle" dominant-baseline="central">Prometheus :9091</text>
  <text class="ts" x="545" y="550" text-anchor="middle" dominant-baseline="central">Grafana :3000</text>
</g>
<path d="M545 490 L545 432" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
<path d="M480 526 L430 432" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Redis -->
<g class="c-green">
  <rect x="60" y="490" width="130" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="511" text-anchor="middle" dominant-baseline="central">Redis cache</text>
  <text class="ts" x="125" y="529" text-anchor="middle" dominant-baseline="central">idempotency :6379</text>
</g>
<path d="M190 432 L125 432 L125 490" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Legend -->
<line x1="20" y1="585" x2="45" y2="585" stroke="#888" stroke-width="1.5"/>
<text class="ts" x="52" y="589" fill="#555">data flow</text>
<line x1="140" y1="585" x2="165" y2="585" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
<text class="ts" x="172" y="589" fill="#555">monitoring / control</text>

</svg>
