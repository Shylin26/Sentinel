services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}

  # ── SENTINEL Services ────────────────────────────────────────────────────────

  webhook:
    build:
      context: ..
      dockerfile: services/webhook/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-sentinel_secret}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  diff-extractor:
    build:
      context: ..
      dockerfile: services/kafka/Dockerfile
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFERENCE_GRPC_HOST: inference:50051
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  inference:
    build:
      context: ..
      dockerfile: services/inference/Dockerfile
    ports:
      - "50051:50051"
      - "9101:9101"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
    restart: unless-stopped

  publisher:
    build:
      context: ..
      dockerfile: services/publisher/Dockerfile
    ports:
      - "9102:9102"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  autoscaler:
    build:
      context: ..
      dockerfile: services/autoscaler/Dockerfile
    ports:
      - "9090:9090"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
